# Edge reverse proxy — only nginx is exposed to the internet; Gunicorn listens on loopback.
# __PORT__ is replaced at container start (Render $PORT).

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    tcp_nopush      on;
    keepalive_timeout  65;

    # Hide server version
    server_tokens off;

    # Rate limit zones (per client IP)
    limit_req_zone $binary_remote_addr zone=general:12m rate=12r/s;
    limit_req_zone $binary_remote_addr zone=auth:12m rate=6r/m;
    limit_conn_zone $binary_remote_addr zone=conn:12m;

    # Request size caps (forms + JSON)
    client_max_body_size 512k;
    client_body_buffer_size 16k;
    large_client_header_buffers 4 8k;

    upstream flask_upstream {
        server 127.0.0.1:8001;
        keepalive 8;
    }

    server {
        listen __PORT__;
        server_name _;

        # Security headers (nginx layer; Flask Talisman adds others)
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

        # Block obvious probe paths before they hit Python
        location ~ /\.(?!well-known) {
            return 403;
        }
        location ~* \.(php|phtml|asp|aspx|jsp|cgi|env|bak|sql)$ {
            return 403;
        }
        location ~* ^/(wp-admin|wp-content|wp-includes|wordpress|phpmyadmin|pma|xmlrpc\.php|cgi-bin|actuator) {
            return 403;
        }

        location = /health {
            access_log off;
            proxy_pass http://flask_upstream;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        location /static/ {
            limit_req zone=general burst=40 nodelay;
            limit_conn conn 30;
            proxy_pass http://flask_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            expires 7d;
            add_header Cache-Control "public, immutable";
        }

        location /auth/ {
            limit_req zone=auth burst=8 nodelay;
            limit_conn conn 15;
            proxy_pass http://flask_upstream;
            include /app/nginx/proxy_params.conf;
        }

        location / {
            limit_req zone=general burst=30 nodelay;
            limit_conn conn 30;
            proxy_pass http://flask_upstream;
            include /app/nginx/proxy_params.conf;
        }
    }
}
