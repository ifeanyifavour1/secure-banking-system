# Render Blueprint — Secure Banking (API + Flask UI)
# Docs: https://render.com/docs/blueprint-spec
#
# After deploy: set secret env vars in the Render dashboard (see DEPLOY_RENDER.md).

services:
  - type: web
    name: banking-api
    runtime: docker
    rootDir: backend/BankingApi
    dockerfilePath: Dockerfile
    plan: free
    healthCheckPath: /health
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: ConnectionStrings__neondb
        sync: false
      - key: Jwt__Secret
        sync: false
      - key: Admin__RoleAssignmentSecret
        sync: false
      # Set after frontend is live: https://banking-frontend-xxxx.onrender.com
      - key: Frontend__Url
        sync: false

  - type: web
    name: banking-frontend
    runtime: docker
    rootDir: frontend
    dockerfilePath: Dockerfile
    plan: free
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.8"
      - key: FLASK_ENV
        value: production
      - key: FLASK_SECRET_KEY
        sync: false
      - key: Admin__RoleAssignmentSecret
        sync: false
      - key: API_BASE_URL
        fromService:
          type: web
          name: banking-api
          envVarKey: RENDER_EXTERNAL_URL
